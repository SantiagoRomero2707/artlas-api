name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    uses: SantiagoRomero2707/shared-workflows/.github/workflows/build.yml@master
    with:
      java-version: '17'

  test:
    needs: build
    uses: SantiagoRomero2707/shared-workflows/.github/workflows/test.yml@master
    with:
      java-version: '17'
      postgres-database: artlas_test
      postgres-user: artlas_user
    secrets:
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

  docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: SantiagoRomero2707/shared-workflows/.github/workflows/docker.yml@master
    with:
      image-name: santiago2707/artlas-api
      dockerhub-username: santiago2707
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: SantiagoRomero2707/shared-workflows/.github/workflows/deploy.yml@master
    secrets:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
