name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    uses: SantiagoRomero2707/shared-workflows/.github/workflows/build.yml@master
    with:
      java-version: '17'
      mysql-database: artlas_test
      mysql-user: artlas_user
    secrets:
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
