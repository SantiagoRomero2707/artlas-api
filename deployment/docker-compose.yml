services:
  db:
    image: postgres:16
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: prueba_jaime_torres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    networks:
      - mi-red-local
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "prueba_jaime_torres"]
      interval: 5s
      timeout: 5s
      retries: 10

  integration-tests:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - .:/app
    networks:
      - mi-red-local
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/prueba_jaime_torres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_PROFILES_ACTIVE=test
    command: ["mvn", "test"]

  backend-java:
    build: .
    ports:
      - '8080:8080'
    networks:
      - mi-red-local
    depends_on:
      db:
        condition: service_healthy
      integration-tests:
        condition: service_completed_successfully
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/prueba_jaime_torres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_SHOW_SQL=true

networks:
  mi-red-local:
    driver: bridge
