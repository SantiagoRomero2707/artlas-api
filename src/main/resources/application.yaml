spring:
  application:
    name: artlas-api
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:12345}
      roles: USER,ADMIN

springdoc:
  api-docs:
    enabled: true
  show-login-endpoint: false